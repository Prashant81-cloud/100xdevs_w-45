name: Deploy To Stagine

on:
  push:
    branches:
      - main

jobs:
  redeploy_everything:
    name: Deploying everything to the Staging
    runs-on: ubuntu-latest

    steps:
      - name: SSH Into Server And Deploy
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/ssh_key
          chmod 600 ~/ssh_key

          # Force bash to run as a login shell so it loads your paths properly
          ssh -o StrictHostKeyChecking=no -i ~/ssh_key azureuser@57.158.25.94 "/bin/bash -l" << 'EOF'
            # CRITICAL: Exit immediately if any command fails.
            set -e

            # Explicitly load NVM environment variables
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # Add pnpm global binaries to the current path if needed
            export PATH="$HOME/.local/share/pnpm:$PATH"

            cd ~/100xdevs_w-45

            # Force server to match remote production state
            git fetch origin production
            git reset --hard origin/production

            pnpm install

            cd packages/prisma
            npx prisma generate --config prisma.config.ts

            cd ~/100xdevs_w-45

            pnpm run build

            # Restarting PM2 daemons safely
            pm2 restart fe-server
            pm2 restart http-server
            pm2 restart ws-server

            # Save the PM2 state
            pm2 save
          EOF